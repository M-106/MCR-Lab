    type: "all"
    save_path: "./mcr_maps" # "./output/eval_ground_truths_mean.json"
    center_algorithm: "mean"    # "squares", "mean"
    generate_2d_gt_maps: True

inference:
  checkpoint_path: "./output/checkpoint/"
  save_path: "./output/inference/eval_preds.json"

