mode: train    # custom_train, train, test, inference, tryout, preprocessing, eval_extraction


curstom_train:
  batch_size: 8 # 12
  epochs: 10
  learning_rate: 0.001
  criterion: "bce"  # FIXME
  optimizer: "adam"
  training_in_2d: True
  metrics_aggregator: "simple_loss"
  experiment_name: "first pipeline try"
  # add more


# FIXME -> currently most of the trai args are not connected yet
train:
  batch_size: 8 # 12
  epochs: 10
  learning_rate: 0.001
  use_amp: False
  scaler: None
  checkpoint_dir: "./checkpoint_dir"
  criterion: "iou"
  optimizer: "not sure"
  checkpoint_best_model: True
  val_steps: 5
  lr_scheduler: None

test:
  metrices: []
  batch_size: 5

preprocessing:
  file_ending: ".h5"  # ".h5", ".ply"

eval_extraction:
    names: ["whu", "sud"]
    data_paths: ["/data/whu3d-dataset-wo-test-label", "/data/SUD-ROAD"] # ["C:/Users/tippolito/Data/whu3d-dataset-wo-test-label", "C:/Users/tippolito/Data/SUD-ROAD"]
