    "torch_geometric",
    "tensorboard",
    "numba",
    "python-dotenv",
    "scikit-learn",
    "scikit-image",
    "ultralytics",
    "h5py",
    "evaluate",
    "albumentations",
    "mlflow",
    "tensorboard",
    "shapely",

    # "monai",

    "segmentation_models_pytorch",

    # "pywhu3d",
