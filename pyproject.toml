    "pyyaml",
    
    "transformers==4.41.0",
    "tokenizers==0.19.1",
    "accelerate==0.30.1",
    "datasets==2.19.0",
    "huggingface_hub",

    # "transformers",
    # "tokenizers",
    # "accelerate",
    # "datasets",
    # "huggingface_hub",
    
    # "torch==2.2.2",
